<!DOCTYPE html>
<html>
<head>
  <title>Anna's Cookie Bank</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #fff8dc;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      color: #d2691e;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #8b4513;
      margin-bottom: 30px;
    }

    /* Cookie button */
    .cookie-button {
      width: 120px;
      height: 120px;
      background-color: #f4a460;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      box-shadow: 3px 3px 6px #a0522d;
      transition: transform 0.2s;
    }

    .cookie-button:hover {
      transform: scale(1.1);
    }

    /* Chocolate chips */
    .chip {
      width: 15px;
      height: 15px;
      background-color: #5c4033;
      border-radius: 50%;
      position: absolute;
    }

    .chip1 { top: 20px; left: 30px; }
    .chip2 { top: 50px; left: 60px; }
    .chip3 { top: 70px; left: 40px; }
    .chip4 { top: 30px; left: 70px; }
    .chip5 { top: 60px; left: 20px; }

  </style>
</head>
<body>

  <h1>Anna's Cookie Bank</h1>
  <p>Donate $100 to get your virtual cookie!</p>

  <!-- Replace YOUR-STRIPE-LINK with your real Stripe payment link -->
  <a href="https://buy.stripe.com/YOUR-STRIPE-LINK">
    <button class="cookie-button">
      <div class="chip chip1"></div>
      <div class="chip chip2"></div>
      <div class="chip chip3"></div>
      <div class="chip chip4"></div>
      <div class="chip chip5"></div>
    </button>
  </a>

  <p>Click the cookie to donate and enjoy!</p>

</body>
</html>
